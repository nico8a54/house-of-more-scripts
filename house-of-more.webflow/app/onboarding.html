<!-- ============================================================
   House of More — Member Onboarding Walkthrough
   Paste full contents into Webflow Page Settings → Before </body>
============================================================ -->

<div id="hom-onboarding" style="display:none">
  <div class="hom-ob-backdrop"></div>
  <div class="hom-ob-ring" id="hom-ob-ring"></div>
  <div class="hom-ob-card" id="hom-ob-card">
    <div class="hom-ob-dots" id="hom-ob-dots"></div>
    <div class="hom-ob-emoji" id="hom-ob-emoji"></div>
    <div class="hom-ob-title" id="hom-ob-title"></div>
    <div class="hom-ob-body" id="hom-ob-body"></div>
    <div class="hom-ob-actions">
      <button class="hom-ob-btn-skip" id="hom-ob-skip">Skip</button>
      <button class="hom-ob-btn-next" id="hom-ob-next">Next</button>
    </div>
  </div>
</div>

<script>
(function () {

  /* ── Steps ───────────────────────────────────────────── */
  const STEPS = [
    {
      emoji:  "\uD83D\uDC4B",
      title:  "Welcome to House of More!",
      body:   "Let us show you around. This is your member portal where you connect, grow, and give back to the community.",
      target: null,
    },
    {
      emoji:  "\uD83D\uDDD3",
      title:  "Find Events",
      body:   "Browse upcoming gatherings, workshops, and sessions. Book your spot directly from here.",
      target: ".app-button.find-events",
    },
    {
      emoji:  "\u2705",
      title:  "My Events",
      body:   "All your RSVPs in one place. See what is coming up and manage your bookings.",
      target: ".app-button.my-events",
    },
    {
      emoji:  "\u2709\uFE0F",
      title:  "Messages",
      body:   "This is where the House team will reach you - announcements, updates, and personal notes.",
      target: ".app-button.messages",
    },
    {
      emoji:  "\uD83D\uDC64",
      title:  "Your Profile",
      body:   "Keep your information up to date. Your profile helps us support you better.",
      target: ".app-button.profile",
    },
    {
      emoji:  "\uD83C\uDFE0",
      title:  "You are all set!",
      body:   "Welcome to the community. The House of More is glad to have you.",
      target: null,
    },
  ];

  const STORAGE_KEY_PREFIX = "hom_onboarding_v1_";
  const WEBHOOK_URL = "https://houseofmore.nico-97c.workers.dev/member-profile-update";

  /* ── State ───────────────────────────────────────────── */
  let currentStep = 0;
  let memberId = "";

  /* ── DOM refs ────────────────────────────────────────── */
  const overlay = document.getElementById("hom-onboarding");
  const ring    = document.getElementById("hom-ob-ring");
  const dotsEl  = document.getElementById("hom-ob-dots");
  const emojiEl = document.getElementById("hom-ob-emoji");
  const titleEl = document.getElementById("hom-ob-title");
  const bodyEl  = document.getElementById("hom-ob-body");
  const nextBtn = document.getElementById("hom-ob-next");
  const skipBtn = document.getElementById("hom-ob-skip");

  /* ── Progress dots ───────────────────────────────────── */
  function buildDots() {
    dotsEl.innerHTML = "";
    STEPS.forEach(function (_, i) {
      const dot = document.createElement("div");
      dot.className = "hom-ob-dot" + (i === currentStep ? " active" : "");
      dotsEl.appendChild(dot);
    });
  }

  /* ── Highlight ring ──────────────────────────────────── */
  function positionRing(selector) {
    if (!selector) { ring.style.display = "none"; return; }
    const el = document.querySelector(selector);
    if (!el) { ring.style.display = "none"; return; }
    const r = el.getBoundingClientRect();
    ring.style.display = "block";
    ring.style.top    = (r.top    - 6) + "px";
    ring.style.left   = (r.left   - 6) + "px";
    ring.style.width  = (r.width  + 12) + "px";
    ring.style.height = (r.height + 12) + "px";
  }

  /* ── Render step ─────────────────────────────────────── */
  function renderStep() {
    const step   = STEPS[currentStep];
    const isLast = currentStep === STEPS.length - 1;

    buildDots();
    emojiEl.textContent = step.emoji;
    titleEl.textContent = step.title;
    bodyEl.textContent  = step.body;
    nextBtn.textContent = isLast ? "Get Started" : "Next";
    skipBtn.style.visibility = isLast ? "hidden" : "visible";

    positionRing(step.target);

    // Switch to the highlighted tab
    if (step.target) {
      const tabBtn = document.querySelector(step.target);
      if (tabBtn) tabBtn.click();
    }
  }

  /* ── Complete ────────────────────────────────────────── */
  function markComplete() {
    if (memberId) {
      localStorage.setItem(STORAGE_KEY_PREFIX + memberId, "true");
    }
    if (memberId) {
      try {
        fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ member_id: memberId, onboarding_complete: "true" }),
        });
      } catch (_) {}
    }
  }

  /* ── Close ───────────────────────────────────────────── */
  function closeOverlay() {
    overlay.classList.remove("active");
    overlay.style.display = "none";
    ring.style.display = "none";
    markComplete();
  }

  /* ── Buttons ─────────────────────────────────────────── */
  nextBtn.addEventListener("click", function () {
    if (currentStep < STEPS.length - 1) {
      currentStep++;
      renderStep();
    } else {
      closeOverlay();
    }
  });

  skipBtn.addEventListener("click", function () {
    closeOverlay();
  });

  /* ── Reposition on resize ────────────────────────────── */
  window.addEventListener("resize", function () {
    if (overlay.style.display !== "none") {
      positionRing(STEPS[currentStep].target);
    }
  });

  /* ── Init ────────────────────────────────────────────── */
  function init() {
    memberId = (document.querySelector('[data-ms-member="id"]') || { textContent: "" }).textContent.trim();
    if (memberId && localStorage.getItem(STORAGE_KEY_PREFIX + memberId)) return;
    setTimeout(function () {
      currentStep = 0;
      renderStep();
      overlay.style.display = "block";
      overlay.classList.add("active");
    }, 1200);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 800); });
  } else {
    setTimeout(init, 800);
  }

})();
</script>
