<!-- ============================================================
   House of More — Admin Onboarding Walkthrough
   Paste full contents into Webflow Page Settings → Before </body>
============================================================ -->

<div id="hom-admin-onboarding" style="display:none">
  <div class="hom-aob-backdrop"></div>
  <div class="hom-aob-ring" id="hom-aob-ring"></div>
  <div class="hom-aob-card" id="hom-aob-card">
    <div class="hom-aob-dots" id="hom-aob-dots"></div>
    <div class="hom-aob-emoji" id="hom-aob-emoji"></div>
    <div class="hom-aob-title" id="hom-aob-title"></div>
    <div class="hom-aob-body" id="hom-aob-body"></div>
    <div class="hom-aob-actions">
      <button class="hom-aob-btn-skip" id="hom-aob-skip">Skip</button>
      <button class="hom-aob-btn-next" id="hom-aob-next">Next</button>
    </div>
  </div>
</div>

<script>
(function () {

  /* ── Steps ───────────────────────────────────────────── */
  const STEPS = [
    {
      emoji:  "\uD83D\uDC4B",
      title:  "Welcome to the Admin Panel",
      body:   "This is your command center. From here you manage members, events, messages, and everything that keeps House of More running.",
      target: null,
    },
    {
      emoji:  "\uD83D\uDCCA",
      title:  "Dashboard",
      body:   "Your overview at a glance. See member counts, event activity, and donation totals in one place.",
      target: ".app-button.admin-dashboard",
    },
    {
      emoji:  "\uD83D\uDCCB",
      title:  "Applicants",
      body:   "Review incoming applications. Approve, reject, or flag members from their questionnaire submissions.",
      target: ".app-button.applications",
    },
    {
      emoji:  "\uD83D\uDC65",
      title:  "Members",
      body:   "Your full member roster. Search, filter by status, and manage each member\u2019s profile and standing.",
      target: ".app-button.members",
    },
    {
      emoji:  "\uD83C\uDFAD",
      title:  "Facilitators",
      body:   "See who is running your events. Facilitators get check-in access and event close permissions.",
      target: ".app-button.facilitators",
    },
    {
      emoji:  "\uD83D\uDCC5",
      title:  "Event Manager",
      body:   "View all events and their RSVP lists. Track attendance and close events after they happen.",
      target: ".app-button.event-manager",
    },
    {
      emoji:  "\uD83D\uDCEC",
      title:  "Message Center",
      body:   "Send announcements, personal notes, and updates directly to members. Messages appear in their portal inbox.",
      target: ".app-button.admin-messages",
    },
    {
      emoji:  "\u2705",
      title:  "You are ready!",
      body:   "That covers the essentials. The House of More admin panel is yours to run.",
      target: null,
    },
  ];

  const STORAGE_KEY_PREFIX = "hom_admin_onboarding_v1_";

  /* ── State ───────────────────────────────────────────── */
  let currentStep = 0;
  let adminId = "";

  /* ── DOM refs ────────────────────────────────────────── */
  const overlay = document.getElementById("hom-admin-onboarding");
  const ring    = document.getElementById("hom-aob-ring");
  const dotsEl  = document.getElementById("hom-aob-dots");
  const emojiEl = document.getElementById("hom-aob-emoji");
  const titleEl = document.getElementById("hom-aob-title");
  const bodyEl  = document.getElementById("hom-aob-body");
  const nextBtn = document.getElementById("hom-aob-next");
  const skipBtn = document.getElementById("hom-aob-skip");

  /* ── Progress dots ───────────────────────────────────── */
  function buildDots() {
    dotsEl.innerHTML = "";
    STEPS.forEach(function (_, i) {
      const dot = document.createElement("div");
      dot.className = "hom-aob-dot" + (i === currentStep ? " active" : "");
      dotsEl.appendChild(dot);
    });
  }

  /* ── Highlight ring ──────────────────────────────────── */
  function positionRing(selector) {
    if (!selector) { ring.style.display = "none"; return; }
    const el = document.querySelector(selector);
    if (!el) { ring.style.display = "none"; return; }
    const r = el.getBoundingClientRect();
    ring.style.display = "block";
    ring.style.top    = (r.top    - 6) + "px";
    ring.style.left   = (r.left   - 6) + "px";
    ring.style.width  = (r.width  + 12) + "px";
    ring.style.height = (r.height + 12) + "px";
  }

  /* ── Render step ─────────────────────────────────────── */
  function renderStep() {
    const step   = STEPS[currentStep];
    const isLast = currentStep === STEPS.length - 1;

    buildDots();
    emojiEl.textContent = step.emoji;
    titleEl.textContent = step.title;
    bodyEl.textContent  = step.body;
    nextBtn.textContent = isLast ? "Get Started" : "Next";
    skipBtn.style.visibility = isLast ? "hidden" : "visible";

    positionRing(step.target);

    // Switch to the highlighted tab
    if (step.target) {
      const tabBtn = document.querySelector(step.target);
      if (tabBtn) tabBtn.click();
    }
  }

  /* ── Complete ────────────────────────────────────────── */
  function markComplete() {
    if (adminId) {
      localStorage.setItem(STORAGE_KEY_PREFIX + adminId, "true");
    }
  }

  /* ── Close ───────────────────────────────────────────── */
  function closeOverlay() {
    overlay.classList.remove("active");
    overlay.style.display = "none";
    ring.style.display = "none";
    markComplete();
  }

  /* ── Buttons ─────────────────────────────────────────── */
  nextBtn.addEventListener("click", function () {
    if (currentStep < STEPS.length - 1) {
      currentStep++;
      renderStep();
    } else {
      closeOverlay();
    }
  });

  skipBtn.addEventListener("click", function () {
    closeOverlay();
  });

  /* ── Reposition on resize ────────────────────────────── */
  window.addEventListener("resize", function () {
    if (overlay.style.display !== "none") {
      positionRing(STEPS[currentStep].target);
    }
  });

  /* ── Init ────────────────────────────────────────────── */
  function init() {
    adminId = (document.querySelector('[data-ms-member="id"]') || { textContent: "" }).textContent.trim();
    if (adminId && localStorage.getItem(STORAGE_KEY_PREFIX + adminId)) return;
    setTimeout(function () {
      currentStep = 0;
      renderStep();
      overlay.style.display = "block";
      overlay.classList.add("active");
    }, 1200);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 800); });
  } else {
    setTimeout(init, 800);
  }

})();
</script>
